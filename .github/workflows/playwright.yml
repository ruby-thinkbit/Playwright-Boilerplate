name: Playwright Tests
on:
  push:
    branches: [ main, master, develop, staging ]
  pull_request:
    branches: [ main, master, develop, staging ]

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      target-env: ${{ steps.set-env.outputs.target-env }}
    steps:
      - name: Determine Target Environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "target-env=prod" >> $GITHUB_OUTPUT
          else
            echo "target-env=stage" >> $GITHUB_OUTPUT
          fi

  test:
    needs: determine-environment
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TARGET_ENV: ${{ needs.determine-environment.outputs.target-env }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Run Playwright tests (${{ env.TARGET_ENV }} environment)
      run: npx playwright test
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ env.TARGET_ENV }}
        path: playwright-report/
        retention-days: 30
    
    - name: Upload test results (detailed)
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-results-${{ env.TARGET_ENV }}
        path: test-results/
        retention-days: 30
